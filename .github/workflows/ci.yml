name: CI

on:
  push:
  pull_request:

jobs:
  local-verification:
    name: Local workflow verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install local test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Syntax check Python sources
        run: |
          python -m py_compile \
            src/aussie_ecolens/server.py \
            src/aussie_ecolens/species.py \
            src/cloud/aws/handlers.py \
            src/cloud/model_service/app.py \
            src/cloud/gcp/main.py \
            scripts/render_web_config.py \
            scripts/course_model_predict.py

      - name: Syntax check deployment scripts
        run: |
          bash -n scripts/deploy_aws.sh
          bash -n scripts/deploy_gcp.sh
          bash -n scripts/deploy_model_service.sh

      - name: Run local end-to-end workflow tests
        run: python -m unittest discover -s tests -v
